<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatApp</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
  <script>window.naclUtil = window.naclUtil || nacl.util;</script>
  <style>
    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --grey-50: #f9f9f9;
      --grey-100: #f0f0f0;
      --grey-200: #e0e0e0;
      --grey-400: #9a9a9a;
      --grey-600: #555555;
      --green: #16a34a;
      --red: #dc2626;
      --border: 1px solid #0a0a0a;
      --border-light: 1px solid #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      height: 100vh; overflow: hidden;
    }
    .screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      background: var(--white);
    }
    .screen.active { display: flex; }

    /* AUTH */
    #auth-screen { align-items: center; justify-content: center; padding: 24px; }
    .auth-card {
      width: 100%; max-width: 360px;
      border: var(--border); border-radius: 28px;
      padding: 36px 28px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .app-name {
      font-family: 'DM Serif Display', serif;
      font-size: 32px; color: var(--black); line-height: 1;
    }
    .app-sub {
      font-size: 13px; color: var(--grey-600);
      display: flex; align-items: center; gap: 6px;
    }
    .e2ee-pill {
      background: var(--black); color: var(--white);
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }
    .tab-row {
      display: flex; border: var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none;
      background: transparent; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer; color: var(--grey-400); transition: all 0.2s;
    }
    .tab-btn.active { background: var(--black); color: var(--white); font-weight: 600; }
    .auth-form { display: none; flex-direction: column; gap: 12px; }
    .auth-form.active { display: flex; }
    .field-label {
      font-size: 11px; font-weight: 700; color: var(--grey-600);
      letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 4px;
    }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .text-input {
      width: 100%; padding: 13px 14px;
      border: var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      color: var(--black); background: var(--white); outline: none; transition: all 0.2s;
    }
    .text-input:focus { box-shadow: 0 0 0 3px rgba(10,10,10,0.08); }
    .text-input::placeholder { color: var(--grey-400); }
    .submit-btn {
      width: 100%; padding: 14px;
      background: var(--black); color: var(--white);
      border: var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .submit-btn:active { opacity: 0.8; transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .error-msg {
      font-size: 13px; color: var(--red);
      background: #fef2f2; border: 1px solid #fecaca;
      padding: 9px 12px; border-radius: 8px; display: none;
    }

    /* CONTACTS */
    .topbar {
      border-bottom: var(--border); padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-title {
      font-family: 'DM Serif Display', serif;
      font-size: 24px; color: var(--black);
    }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .username-chip {
      border: var(--border); border-radius: 20px;
      padding: 5px 12px; font-size: 13px; font-weight: 600;
    }
    .icon-btn {
      width: 36px; height: 36px; border: var(--border);
      border-radius: 8px; background: var(--white);
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 16px;
    }
    .icon-btn:active { background: var(--grey-100); }
    #contacts-list { flex: 1; overflow-y: auto; }
    #contacts-list::-webkit-scrollbar { width: 0; }
    .contact-item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-bottom: var(--border-light);
      cursor: pointer; transition: background 0.15s;
    }
    .contact-item:active { background: var(--grey-50); }
    .contact-avatar {
      width: 44px; height: 44px; border: var(--border);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 17px; font-weight: 700;
      color: var(--white); flex-shrink: 0;
    }
    .contact-details { flex: 1; min-width: 0; }
    .contact-name { font-size: 15px; font-weight: 600; }
    .contact-sub { font-size: 12px; color: var(--grey-400); margin-top: 2px; }
    .contact-arrow { font-size: 20px; color: var(--grey-400); }
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--grey-400); font-size: 14px;
      text-align: center; padding: 40px;
    }
    .empty-icon { font-size: 44px; }
    .loading-text { text-align: center; padding: 30px; color: var(--grey-400); font-size: 14px; }

    /* CHAT */
    #chat-topbar {
      border-bottom: var(--border); padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px; border: var(--border);
      border-radius: 8px; background: var(--white); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .chat-avatar {
      width: 38px; height: 38px; border: var(--border);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 15px; font-weight: 700;
      color: var(--white); flex-shrink: 0;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 15px; font-weight: 700; }
    .chat-status {
      font-size: 11px; color: var(--green); font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .chat-status::before {
      content: ''; width: 6px; height: 6px;
      background: var(--green); border-radius: 50%;
    }
    .e2ee-tag {
      border: var(--border-light); border-radius: 20px;
      padding: 3px 10px; font-size: 10px; font-weight: 600;
      color: var(--grey-600); white-space: nowrap;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 8px;
      background: var(--grey-50);
    }
    #messages::-webkit-scrollbar { width: 0; }
    .msg-row {
      display: flex; align-items: flex-end; gap: 7px;
      animation: msgIn 0.22s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-av {
      width: 26px; height: 26px; border: var(--border);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 10px; font-weight: 700;
      color: var(--white); flex-shrink: 0;
    }
    .msg-bubble {
      max-width: 74%; padding: 10px 13px;
      font-size: 14.5px; line-height: 1.5; word-break: break-word;
    }
    .msg-row.mine .msg-bubble {
      background: var(--black); color: var(--white); border: var(--border);
      border-radius: 14px 14px 4px 14px;
    }
    .msg-row.other .msg-bubble {
      background: var(--white); color: var(--black); border: var(--border);
      border-radius: 14px 14px 14px 4px;
    }
    .msg-time { font-size: 10px; margin-top: 4px; text-align: right; opacity: 0.5; }
    .msg-row.mine .msg-time { color: var(--grey-200); }
    #input-bar {
      border-top: var(--border); padding: 10px 14px;
      display: flex; gap: 8px; align-items: center; background: var(--white);
    }
    #msg-input {
      flex: 1; padding: 11px 14px; border: var(--border);
      border-radius: 14px; font-family: 'DM Sans', sans-serif;
      font-size: 15px; color: var(--black); background: var(--white); outline: none;
    }
    #msg-input:focus { box-shadow: 0 0 0 3px rgba(10,10,10,0.08); }
    #msg-input::placeholder { color: var(--grey-400); }
    #send-btn {
      width: 44px; height: 44px; background: var(--black);
      color: var(--white); border: var(--border); border-radius: 8px;
      font-size: 20px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    #send-btn:active { transform: scale(0.92); }

    /* Toast */
    #toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--black); color: var(--white);
      padding: 9px 20px; border-radius: 20px; font-size: 13px;
      opacity: 0; transition: all 0.25s; z-index: 999;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="auth-card">
    <div>
      <div class="app-name">ChatApp</div>
      <div class="app-sub"><span class="e2ee-pill">🔐 E2EE</span> Private &amp; Secure</div>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    <div class="auth-form active" id="login-form">
      <div class="field-group">
        <div class="field-label">Username</div>
        <input class="text-input" id="login-username" type="text" placeholder="Enter username" autocomplete="off"/>
      </div>
      <div class="field-group">
        <div class="field-label">Password</div>
        <input class="text-input" id="login-password" type="password" placeholder="Enter password"/>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="submit-btn" id="login-btn" onclick="login()">Login</button>
    </div>
    <div class="auth-form" id="register-form">
      <div class="field-group">
        <div class="field-label">Username</div>
        <input class="text-input" id="reg-username" type="text" placeholder="Choose a username" autocomplete="off"/>
      </div>
      <div class="field-group">
        <div class="field-label">Password</div>
        <input class="text-input" id="reg-password" type="password" placeholder="Min 4 characters"/>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <button class="submit-btn" id="reg-btn" onclick="register()">Create Account</button>
    </div>
  </div>
</div>

<!-- CONTACTS -->
<div id="contacts-screen" class="screen">
  <div class="topbar">
    <div class="topbar-title">Chats</div>
    <div class="topbar-right">
      <div class="username-chip" id="my-badge">Me</div>
      <button class="icon-btn" onclick="logout()">↩</button>
    </div>
  </div>
  <div id="contacts-list"></div>
</div>

<!-- CHAT -->
<div id="chat-screen" class="screen">
  <div id="chat-topbar">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="chat-avatar" id="chat-av"></div>
    <div class="chat-info">
      <div class="chat-name" id="chat-name">Chat</div>
      <div class="chat-status">Online</div>
    </div>
    <div class="e2ee-tag">🔐 Encrypted</div>
  </div>
  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">👋</div>
      <strong>No messages yet</strong>
      <span>Start the conversation!</span>
    </div>
  </div>
  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="Message..."/>
    <button id="send-btn">↑</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const BACKEND = "https://chatapp-backend-8qb3.onrender.com";
const socket = io(BACKEND, { transports: ['websocket', 'polling'] });

let username = "", token = "", currentRoom = "", currentPartner = "";
let myPrivateKey = null, myPublicKey = null, partnerPubB64 = null;

const COLORS = ["#1a1a2e","#16213e","#0f3460","#533483","#2b2d42","#1b4332","#7b2d8b","#c0392b"];
function getColor(n) { let h=0; for(let c of n) h+=c.charCodeAt(0); return COLORS[h%COLORS.length]; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
  });
  document.getElementById('login-form').classList.toggle('active', tab==='login');
  document.getElementById('register-form').classList.toggle('active', tab==='register');
}
function getRoomId(a,b) { return [a,b].sort().join("_"); }

// CRYPTO
async function deriveKey(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return new Uint8Array(buf);
}
async function encryptPrivKey(priv, pw) {
  const key = await deriveKey(pw);
  const n = nacl.randomBytes(nacl.secretbox.nonceLength);
  const e = nacl.secretbox(priv, n, key);
  return JSON.stringify({ e: naclUtil.encodeBase64(e), n: naclUtil.encodeBase64(n) });
}
async function decryptPrivKey(stored, pw) {
  const key = await deriveKey(pw);
  const { e, n } = JSON.parse(stored);
  return nacl.secretbox.open(naclUtil.decodeBase64(e), naclUtil.decodeBase64(n), key);
}
function encryptMsg(text, receiverPub, senderPriv) {
  const nonce = nacl.randomBytes(nacl.box.nonceLength);
  const enc = nacl.box(naclUtil.decodeUTF8(text), nonce, naclUtil.decodeBase64(receiverPub), senderPriv);
  return JSON.stringify({ e: naclUtil.encodeBase64(enc), n: naclUtil.encodeBase64(nonce) });
}
function decryptMsg(payload, senderPub, myPriv) {
  try {
    const { e, n } = JSON.parse(payload);
    const dec = nacl.box.open(naclUtil.decodeBase64(e), naclUtil.decodeBase64(n), naclUtil.decodeBase64(senderPub), myPriv);
    return dec ? naclUtil.encodeUTF8(dec) : "🔒 Encrypted";
  } catch { return "🔒 Encrypted"; }
}

// REGISTER
async function register() {
  const u = document.getElementById('reg-username').value.trim();
  const p = document.getElementById('reg-password').value.trim();
  if (!u || !p) return showError('reg-error', 'Fill all fields');
  if (p.length < 4) return showError('reg-error', 'Password min 4 characters');
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Generating keys...';
  try {
    const kp = nacl.box.keyPair();
    const pubB64 = naclUtil.encodeBase64(kp.publicKey);
    const encPriv = await encryptPrivKey(kp.secretKey, p);
    const res = await fetch(BACKEND + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p, publicKey: pubB64, encryptedPrivateKey: encPriv })
    });
    const data = await res.json();
    if (!res.ok) { showError('reg-error', data.error); btn.disabled=false; btn.textContent='Create Account'; return; }
    token=data.token; username=data.username;
    myPrivateKey=kp.secretKey; myPublicKey=kp.publicKey;
    enterContacts();
  } catch(err) {
    showError('reg-error', err.message||'Connection error');
    btn.disabled=false; btn.textContent='Create Account';
  }
}

// LOGIN
async function login() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value.trim();
  if (!u || !p) return showError('login-error', 'Fill all fields');
  const btn = document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Decrypting...';
  try {
    const res = await fetch(BACKEND + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (!res.ok) { showError('login-error', data.error); btn.disabled=false; btn.textContent='Login'; return; }
    const priv = await decryptPrivKey(data.encryptedPrivateKey, p);
    if (!priv) { showError('login-error', 'Key decryption failed'); btn.disabled=false; btn.textContent='Login'; return; }
    token=data.token; username=data.username;
    myPrivateKey=priv; myPublicKey=naclUtil.decodeBase64(data.publicKey);
    enterContacts();
  } catch(err) {
    showError('login-error', err.message||'Connection error');
    btn.disabled=false; btn.textContent='Login';
  }
}

// CONTACTS
function enterContacts() {
  document.getElementById('my-badge').textContent = username;
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').textContent='Login';
  showScreen('contacts-screen');
  showToast('Welcome ' + username + '!');
  loadContacts();
}

async function loadContacts() {
  const list = document.getElementById('contacts-list');
  list.innerHTML = '<div class="loading-text">Loading...</div>';
  try {
    const res = await fetch(BACKEND + '/users', { headers: { 'Authorization': 'Bearer ' + token } });
    const users = await res.json();
    list.innerHTML = '';
    if (!users.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">🙁</div><strong>No users yet</strong><span>Ask a friend to register!</span></div>';
      return;
    }
    users.forEach(u => {
      const color = getColor(u.username);
      const item = document.createElement('div');
      item.className = 'contact-item';
      item.innerHTML = `
        <div class="contact-avatar" style="background:${color}">${u.username[0].toUpperCase()}</div>
        <div class="contact-details">
          <div class="contact-name">${u.username}</div>
          <div class="contact-sub">🔐 End-to-end encrypted</div>
        </div>
        <div class="contact-arrow">›</div>`;
      item.onclick = () => openChat(u.username, u.publicKey);
      list.appendChild(item);
    });
  } catch {
    list.innerHTML = '<div class="loading-text" style="color:#dc2626">Failed to load</div>';
  }
}

// OPEN CHAT
async function openChat(partner, pubKeyB64) {
  currentPartner = partner;
  currentRoom = getRoomId(username, partner);
  partnerPubB64 = pubKeyB64;

  const color = getColor(partner);
  document.getElementById('chat-av').textContent = partner[0].toUpperCase();
  document.getElementById('chat-av').style.background = color;
  document.getElementById('chat-name').textContent = partner;
  document.getElementById('messages').innerHTML =
    '<div class="empty-state" id="empty-state"><div class="empty-icon">👋</div><strong>No messages yet</strong><span>Say hello!</span></div>';

  socket.emit('join_room', { userA: username, userB: partner });
  showScreen('chat-screen');
  await loadMessages();
}

// LOAD MESSAGES
async function loadMessages() {
  try {
    const res = await fetch(BACKEND + '/messages/' + currentRoom, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const msgs = await res.json();
    if (msgs.length) {
      document.getElementById('empty-state')?.remove();
      for (const m of msgs) {
        const isMine = m.username === username;
        let text = m.text;
        try {
          const senderPub = isMine ? naclUtil.encodeBase64(myPublicKey) : partnerPubB64;
          text = decryptMsg(m.text, senderPub, myPrivateKey);
        } catch {}
        addBubble(m.username, text, m.timestamp, false);
      }
      scrollBottom();
    }
  } catch {}
}

// SEND
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !username || !currentRoom || !partnerPubB64 || !myPrivateKey) return;
  const encrypted = encryptMsg(text, partnerPubB64, myPrivateKey);
  socket.emit('send_message', { username, text: encrypted, roomId: currentRoom });
  input.value = '';
  document.getElementById('empty-state')?.remove();
  addBubble(username, text, new Date(), true);
  scrollBottom();
}

// RECEIVE — KEY FIX: only show if message is for current room
socket.on('receive_message', data => {
  if (data.username === username) return;
  if (!currentRoom || !partnerPubB64) return;
  // Only show if sender is current chat partner
  if (data.username !== currentPartner) return;
  document.getElementById('empty-state')?.remove();
  let text = data.text;
  try { text = decryptMsg(data.text, partnerPubB64, myPrivateKey); } catch {}
  addBubble(data.username, text, data.timestamp, true);
  scrollBottom();
});

function addBubble(user, text, timestamp, animate) {
  const isMine = user === username;
  const color = getColor(user);
  const time = new Date(timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'other');
  if (!animate) row.style.animation = 'none';
  row.innerHTML = `
    <div class="msg-av" style="background:${color}">${user[0].toUpperCase()}</div>
    <div class="msg-bubble">
      <div>${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  document.getElementById('messages').appendChild(row);
}

function scrollBottom() { const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function goBack() { currentRoom=''; currentPartner=''; partnerPubB64=null; showScreen('contacts-screen'); }
function logout() {
  username=''; token=''; currentRoom=''; currentPartner='';
  myPrivateKey=null; myPublicKey=null; partnerPubB64=null;
  showScreen('auth-screen');
}

document.getElementById('login-password').addEventListener('keypress', e => { if(e.key==='Enter') login(); });
