<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatApp</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
  <script>window.naclUtil = window.naclUtil || nacl.util;</script>
  <style>
    :root {
      --black: #0a0a0a;
      --gray-1: #f5f5f5;
      --gray-2: #e8e8e8;
      --gray-3: #c0c0c0;
      --gray-4: #888888;
      --accent: #0066ff;
      --accent-light: #e8f0ff;
      --red: #ef4444;
      --green: #22c55e;
      --white: #ffffff;
      --border: 1px solid #e0e0e0;
      --radius: 12px;
      --font: 'DM Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      height: 100vh;
      overflow: hidden;
    }
    .screen {
      position: fixed; inset: 0; display: none;
      flex-direction: column; background: var(--white);
    }
    .screen.active { display: flex; }

    /* AUTH */
    #auth-screen { align-items: center; justify-content: center; padding: 24px; }
    .auth-card {
      width: 100%; max-width: 360px;
      border: 1px solid var(--gray-2);
      border-radius: 20px; padding: 36px 28px;
      background: var(--white);
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .logo-icon {
      width: 40px; height: 40px; background: var(--black);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .logo-text { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--black); }
    .auth-subtitle { font-size: 13px; color: var(--gray-4); margin-bottom: 20px; }
    .e2ee-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 20px; padding: 4px 10px;
      font-size: 11px; font-weight: 600; color: #16a34a; margin-bottom: 20px;
    }
    .tab-row {
      display: flex; border: var(--border); border-radius: 10px;
      padding: 3px; margin-bottom: 20px; gap: 3px;
    }
    .tab-btn {
      flex: 1; padding: 9px; border: none; border-radius: 8px;
      font-family: var(--font); font-size: 14px; font-weight: 600;
      cursor: pointer; background: transparent; color: var(--gray-4); transition: all 0.2s;
    }
    .tab-btn.active { background: var(--black); color: var(--white); }
    .auth-form { display: none; flex-direction: column; gap: 12px; }
    .auth-form.active { display: flex; }
    .field-label {
      font-size: 12px; font-weight: 600; color: var(--gray-4);
      margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .field-wrap { display: flex; flex-direction: column; }
    .app-input {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--gray-2); border-radius: var(--radius);
      font-family: var(--font); font-size: 15px; color: var(--black);
      background: var(--white); outline: none; transition: border-color 0.2s;
    }
    .app-input:focus { border-color: var(--black); }
    .app-input::placeholder { color: var(--gray-3); }
    .error-msg {
      font-size: 13px; color: var(--red); background: #fef2f2;
      border: 1px solid #fecaca; border-radius: 8px;
      padding: 8px 12px; display: none; text-align: center;
    }
    .submit-btn {
      width: 100%; padding: 13px; background: var(--black);
      border: none; border-radius: var(--radius); color: var(--white);
      font-family: var(--font); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s; margin-top: 4px;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:active { opacity: 0.8; }

    /* CONTACTS */
    .topbar {
      padding: 16px 20px; border-bottom: var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--white);
    }
    .topbar-left { display: flex; flex-direction: column; gap: 2px; }
    .topbar-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .topbar-sub { font-size: 12px; color: var(--gray-4); }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .username-pill {
      background: var(--accent-light); border: 1px solid #c7d9ff;
      border-radius: 20px; padding: 5px 12px;
      font-size: 13px; font-weight: 600; color: var(--accent);
    }
    .logout-btn {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 7px 12px; color: var(--red);
      font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #contacts-list {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #contacts-list::-webkit-scrollbar { width: 3px; }
    .contact-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border: 1px solid var(--gray-2);
      border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s; background: var(--white);
    }
    .contact-item:active { background: var(--gray-1); }
    .contact-av {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid var(--gray-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700; color: var(--white); flex-shrink: 0;
    }
    .contact-details { flex: 1; }
    .contact-name { font-size: 15px; font-weight: 600; }
    .contact-hint { font-size: 12px; color: var(--gray-4); margin-top: 1px; }
    .contact-arrow { color: var(--gray-3); font-size: 18px; }
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--gray-4); font-size: 14px; text-align: center; padding: 40px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 4px; }

    /* CHAT */
    #chat-topbar {
      padding: 12px 16px; border-bottom: var(--border);
      display: flex; align-items: center; gap: 12px; background: var(--white);
    }
    .back-btn {
      width: 36px; height: 36px; border: var(--border);
      border-radius: 8px; background: var(--white);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; color: var(--black); flex-shrink: 0;
    }
    .chat-av {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--gray-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: var(--white); flex-shrink: 0;
    }
    .chat-topbar-info { flex: 1; }
    .chat-topbar-name { font-size: 15px; font-weight: 600; }
    .chat-e2ee { font-size: 11px; color: var(--green); font-weight: 600; }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 8px; background: var(--gray-1);
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--gray-4); font-size: 14px; text-align: center;
    }
    .msg-row { display: flex; align-items: flex-end; gap: 6px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-av {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--white);
      flex-shrink: 0; border: 1px solid var(--gray-2);
    }
    .msg-bubble {
      max-width: 75%; padding: 9px 13px; border-radius: 16px;
      font-size: 14.5px; line-height: 1.5; word-break: break-word;
      border: 1px solid transparent;
    }
    .msg-row.mine .msg-bubble {
      background: var(--black); color: var(--white);
      border-color: var(--black); border-bottom-right-radius: 4px;
    }
    .msg-row.other .msg-bubble {
      background: var(--white); color: var(--black);
      border-color: var(--gray-2); border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 10px; margin-top: 3px; opacity: 0.5; text-align: right; }
    .msg-row.other .msg-time { text-align: left; }
    #bottom-bar {
      padding: 10px 12px; border-top: var(--border);
      display: flex; gap: 8px; align-items: center; background: var(--white);
    }
    #msg-input {
      flex: 1; padding: 11px 14px;
      border: 1px solid var(--gray-2); border-radius: 22px;
      font-family: var(--font); font-size: 15px; color: var(--black);
      background: var(--gray-1); outline: none; transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--black); background: var(--white); }
    #msg-input::placeholder { color: var(--gray-3); }
    #send-btn {
      width: 44px; height: 44px; background: var(--black);
      border: none; border-radius: 50%; color: var(--white);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #send-btn:active { opacity: 0.7; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--black); color: var(--white);
      padding: 9px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: all 0.25s; z-index: 999;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen active">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">💬</div>
      <div class="logo-text">ChatApp</div>
    </div>
    <div class="auth-subtitle">Secure private messaging</div>
    <div class="e2ee-tag">🔐 End-to-End Encrypted</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    <div class="auth-form active" id="login-form">
      <div class="field-wrap">
        <div class="field-label">Username</div>
        <input class="app-input" id="login-username" type="text" placeholder="Enter username" autocomplete="off"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Password</div>
        <input class="app-input" id="login-password" type="password" placeholder="Enter password"/>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="submit-btn" id="login-btn" onclick="login()">Login</button>
    </div>
    <div class="auth-form" id="register-form">
      <div class="field-wrap">
        <div class="field-label">Username</div>
        <input class="app-input" id="reg-username" type="text" placeholder="Choose a username" autocomplete="off"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Password</div>
        <input class="app-input" id="reg-password" type="password" placeholder="Min 4 characters"/>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <button class="submit-btn" id="reg-btn" onclick="register()">Create Account</button>
    </div>
  </div>
</div>

<!-- CONTACTS -->
<div id="contacts-screen" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Chats</div>
      <div class="topbar-sub" id="contacts-count"></div>
    </div>
    <div class="topbar-right">
      <div class="username-pill" id="my-badge">Me</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div id="contacts-list"></div>
</div>

<!-- CHAT -->
<div id="chat-screen" class="screen">
  <div id="chat-topbar">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="chat-av" id="chat-av">?</div>
    <div class="chat-topbar-info">
      <div class="chat-topbar-name" id="chat-name">Chat</div>
      <div class="chat-e2ee">🔐 End-to-end encrypted</div>
    </div>
  </div>
  <div id="messages">
    <div id="chat-empty">
      <div class="empty-icon">👋</div>
      <strong>No messages yet</strong>
      <span>Say hello!</span>
    </div>
  </div>
  <div id="bottom-bar">
    <input id="msg-input" type="text" placeholder="Message..."/>
    <button id="send-btn">➤</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const BACKEND = "https://chatapp-backend-8qb3.onrender.com";
const socket = io(BACKEND, { transports: ['websocket', 'polling'] });

let myUsername = "";
let myToken = "";
let myPrivateKey = null;
let myPublicKey = null;
let currentRoom = "";
let currentPartner = "";
let partnerPubB64 = "";

const COLORS = ["#0066ff","#e11d48","#7c3aed","#0891b2","#059669","#d97706","#dc2626"];
function colorFor(name) {
  let h = 0;
  for (let c of name) h += c.charCodeAt(0);
  return COLORS[h % COLORS.length];
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3500);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
  });
  document.getElementById('login-form').classList.toggle('active', tab==='login');
  document.getElementById('register-form').classList.toggle('active', tab==='register');
}

function roomId(a, b) { return [a,b].sort().join('_'); }

// CRYPTO
async function deriveKey(password) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
  return new Uint8Array(buf);
}

async function encryptPrivKey(privKey, password) {
  const key = await deriveKey(password);
  const nonce = nacl.randomBytes(nacl.secretbox.nonceLength);
  const box = nacl.secretbox(privKey, nonce, key);
  return JSON.stringify({ e: naclUtil.encodeBase64(box), n: naclUtil.encodeBase64(nonce) });
}

async function decryptPrivKey(stored, password) {
  const key = await deriveKey(password);
  const { e, n } = JSON.parse(stored);
  return nacl.secretbox.open(naclUtil.decodeBase64(e), naclUtil.decodeBase64(n), key);
}

function encryptMsg(text, receiverPubB64, senderPriv) {
  const nonce = nacl.randomBytes(nacl.box.nonceLength);
  const box = nacl.box(naclUtil.decodeUTF8(text), nonce, naclUtil.decodeBase64(receiverPubB64), senderPriv);
  return JSON.stringify({ e: naclUtil.encodeBase64(box), n: naclUtil.encodeBase64(nonce) });
}

function decryptMsg(payload, senderPubB64, myPriv) {
  try {
    const { e, n } = JSON.parse(payload);
    const open = nacl.box.open(
      naclUtil.decodeBase64(e),
      naclUtil.decodeBase64(n),
      naclUtil.decodeBase64(senderPubB64),
      myPriv
    );
    return open ? naclUtil.encodeUTF8(open) : '🔒 Encrypted';
  } catch { return '🔒 Encrypted'; }
}

// REGISTER
async function register() {
  const u = document.getElementById('reg-username').value.trim();
  const p = document.getElementById('reg-password').value.trim();
  if (!u || !p) return showErr('reg-error', 'Please fill all fields');
  if (p.length < 4) return showErr('reg-error', 'Password min 4 characters');
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating keys...';
  try {
    const kp = nacl.box.keyPair();
    const pubB64 = naclUtil.encodeBase64(kp.publicKey);
    const encPriv = await encryptPrivKey(kp.secretKey, p);
    const res = await fetch(BACKEND + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p, publicKey: pubB64, encryptedPrivateKey: encPriv })
    });
    const data = await res.json();
    if (!res.ok) { showErr('reg-error', data.error || 'Failed'); btn.disabled=false; btn.textContent='Create Account'; return; }
    myToken = data.token; myUsername = data.username;
    myPrivateKey = kp.secretKey; myPublicKey = kp.publicKey;
    btn.disabled=false; btn.textContent='Create Account';
    enterContacts();
  } catch { showErr('reg-error', 'Connection error'); btn.disabled=false; btn.textContent='Create Account'; }
}

// LOGIN
async function login() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value.trim();
  if (!u || !p) return showErr('login-error', 'Please fill all fields');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const res = await fetch(BACKEND + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (!res.ok) { showErr('login-error', data.error || 'Failed'); btn.disabled=false; btn.textContent='Login'; return; }
    const privKey = await decryptPrivKey(data.encryptedPrivateKey, p);
    if (!privKey) { showErr('login-error', 'Failed to decrypt keys'); btn.disabled=false; btn.textContent='Login'; return; }
    myToken = data.token; myUsername = data.username;
    myPrivateKey = privKey; myPublicKey = naclUtil.decodeBase64(data.publicKey);
    btn.disabled=false; btn.textContent='Login';
    enterContacts();
  } catch { showErr('login-error', 'Connection error'); btn.disabled=false; btn.textContent='Login'; }
}

// CONTACTS
async function enterContacts() {
  document.getElementById('my-badge').textContent = myUsername;
  showScreen('contacts-screen');
  showToast('Welcome ' + myUsername + ' 👋');
  await loadContacts();
}

async function loadContacts() {
  const list = document.getElementById('contacts-list');
  const countEl = document.getElementById('contacts-count');
  list.innerHTML = '<div style="padding:30px;text-align:center;color:#888">Loading...</div>';
  try {
    const res = await fetch(BACKEND + '/users', { headers: { 'Authorization': 'Bearer ' + myToken } });
    const users = await res.json();
    if (!Array.isArray(users) || users.length === 0) {
      countEl.textContent = '0 contacts';
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><strong>No users yet</strong><span>Ask a friend to register!</span></div>';
      return;
    }
    countEl.textContent = users.length + ' contact' + (users.length > 1 ? 's' : '');
    list.innerHTML = '';
    users.forEach(u => {
      const color = colorFor(u.username);
      const item = document.createElement('div');
      item.className = 'contact-item';
      item.innerHTML = `
        <div class="contact-av" style="background:${color}">${u.username[0].toUpperCase()}</div>
        <div class="contact-details">
          <div class="contact-name">${u.username}</div>
          <div class="contact-hint">🔐 Tap to chat privately</div>
        </div>
        <div class="contact-arrow">›</div>`;
      item.onclick = () => openChat(u.username, u.publicKey);
      list.appendChild(item);
    });
  } catch {
    list.innerHTML = '<div style="padding:30px;text-align:center;color:#ef4444">Failed to load contacts</div>';
  }
}

// OPEN CHAT
async function openChat(partner, partnerPublicKey) {
  currentPartner = partner;
  currentRoom = roomId(myUsername, partner);
  partnerPubB64 = partnerPublicKey;

  const color = colorFor(partner);
  document.getElementById('chat-name').textContent = partner;
  document.getElementById('chat-av').textContent = partner[0].toUpperCase();
  document.getElementById('chat-av').style.background = color;
  document.getElementById('messages').innerHTML = '<div id="chat-empty"><div class="empty-icon">👋</div><strong>No messages yet</strong><span>Say hello to ' + partner + '!</span></div>';

  socket.emit('join_room', { userA: myUsername, userB: partner });
  showScreen('chat-screen');
  await loadMessages();
}

// LOAD MESSAGES
async function loadMessages() {
  try {
    const res = await fetch(BACKEND + '/messages/' + currentRoom, { headers: { 'Authorization': 'Bearer ' + myToken } });
    const msgs = await res.json();
    if (!Array.isArray(msgs) || msgs.length === 0) return;
    document.getElementById('chat-empty')?.remove();
    for (const m of msgs) {
      const isMine = m.username === myUsername;
      let text = m.text;
      try {
        // Sender encrypted with receiver's pubkey
        // If mine: I encrypted with partner's pubkey → decrypt using partner's pubkey + my privkey
        // If theirs: they encrypted with my pubkey → decrypt using their pubkey + my privkey
        const senderPub = isMine ? naclUtil.encodeBase64(myPublicKey) : partnerPubB64;
        text = decryptMsg(m.text, senderPub, myPrivateKey);
      } catch { text = '🔒 Encrypted'; }
      renderBubble(m.username, text, m.timestamp, false);
    }
    scrollBottom();
  } catch {}
}

// SEND
document.getElementById('send-btn').addEventListener('click', sendMsg);
document.getElementById('msg-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });

function sendMsg() {
  const text = document.getElementById('msg-input').value.trim();
  if (!text || !myUsername || !currentRoom || !partnerPubB64 || !myPrivateKey) return;
  try {
    const encrypted = encryptMsg(text, partnerPubB64, myPrivateKey);
    socket.emit('send_message', { username: myUsername, text: encrypted, roomId: currentRoom });
    document.getElementById('msg-input').value = '';
    document.getElementById('chat-empty')?.remove();
    renderBubble(myUsername, text, new Date().toISOString(), true);
    scrollBottom();
  } catch { showToast('Send failed'); }
}

// RECEIVE
socket.on('receive_message', data => {
  if (data.username === myUsername) return;
  if (!currentRoom) return;
  document.getElementById('chat-empty')?.remove();
  let text = data.text;
  try {
    // They encrypted with MY public key — decrypt using their pubkey + my privkey
    text = decryptMsg(data.text, partnerPubB64, myPrivateKey);
  } catch { text = '🔒 Encrypted'; }
  renderBubble(data.username, text, data.timestamp, true);
  scrollBottom();
});

// RENDER BUBBLE
function renderBubble(user, text, timestamp, animate) {
  const isMine = user === myUsername;
  const color = colorFor(user);
  const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'other');
  if (animate) {
    row.style.cssText = 'opacity:0;transform:translateY(8px);transition:all 0.2s ease';
    setTimeout(() => { row.style.opacity='1'; row.style.transform='translateY(0)'; }, 10);
  }
  row.innerHTML = `
    <div class="msg-av" style="background:${color}">${user[0].toUpperCase()}</div>
    <div class="msg-bubble">
      <div>${escHtml(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  document.getElementById('messages').appendChild(row);
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const m = document.getElementById('messages');
  setTimeout(() => m.scrollTop = m.scrollHeight, 50);
}

function goBack() {
  currentRoom = ''; currentPartner = ''; partnerPubB64 = '';
  showScreen('contacts-screen');
  loadContacts();
}

function logout() {
  myUsername=''; myToken=''; myPrivateKey=null; myPublicKey=null;
  currentRoom=''; currentPartner=''; partnerPubB64='';
  showScreen('auth-screen');
}

document.getElementById('login-password').addEventListener('keypress', e => { if (e.key==='Enter') login(); });
document.getElementById('reg-password').addEventListener('keypress', e => { if (e.key==='Enter') register(); });
</script>
