<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #f857a6;
      --purple: #a855f7;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --green: #10b981;
      --text-dark: #1e1b4b;
      --text-mid: #4c4780;
      --text-light: #7c73b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2, #fcb69f, #ffeaa7, #a29bfe, #fd79a8);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      overflow: hidden;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-bubble {
      position: fixed; border-radius: 50%; opacity: 0.15;
      animation: floatBubble linear infinite; pointer-events: none; z-index: 0;
    }
    @keyframes floatBubble {
      0% { transform: translateY(110vh); opacity: 0; }
      10% { opacity: 0.15; } 90% { opacity: 0.15; }
      100% { transform: translateY(-20vh); opacity: 0; }
    }
    .screen {
      position: fixed; inset: 0; display: none;
      flex-direction: column; z-index: 10;
    }
    .screen.active { display: flex; }

    /* ── AUTH ── */
    #auth-screen {
      align-items: center; justify-content: center; padding: 20px;
    }
    .name-card {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(24px);
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 32px;
      padding: 48px 36px;
      width: 100%; max-width: 380px;
      box-shadow: 0 8px 40px rgba(168,85,247,0.18);
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      animation: cardPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes cardPop {
      0% { transform: scale(0.7) translateY(40px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .app-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-radius: 22px; display: flex;
      align-items: center; justify-content: center;
      font-size: 34px;
      box-shadow: 0 8px 24px rgba(168,85,247,0.35);
    }
    .name-card h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 26px; font-weight: 700; color: var(--text-dark);
    }
    .name-card p { font-size: 14px; color: var(--text-mid); margin-top: -10px; }
    .tab-row {
      display: flex; background: rgba(255,255,255,0.4);
      border-radius: 14px; padding: 4px; width: 100%; gap: 4px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.3s;
      background: transparent; color: var(--text-mid);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: white; box-shadow: 0 4px 14px rgba(168,85,247,0.3);
    }
    .auth-form { display: none; flex-direction: column; gap: 14px; width: 100%; }
    .auth-form.active { display: flex; }
    .input-wrap { position: relative; }
    .input-wrap span {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 18px;
    }
    .glass-input {
      width: 100%; padding: 14px 14px 14px 44px;
      background: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 14px; font-family: 'Nunito', sans-serif;
      font-size: 15px; color: var(--text-dark); outline: none; transition: all 0.3s;
    }
    .glass-input:focus {
      border-color: var(--purple); background: rgba(255,255,255,0.7);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
    }
    .glass-input::placeholder { color: var(--text-light); }
    .primary-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none; border-radius: 14px; color: white;
      font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; box-shadow: 0 6px 20px rgba(168,85,247,0.35);
      transition: all 0.3s;
    }
    .primary-btn:active { transform: scale(0.98); }
    .error-msg {
      color: #ef4444; font-size: 13px; text-align: center;
      background: rgba(239,68,68,0.1); padding: 8px 14px;
      border-radius: 10px; display: none;
    }

    /* ── CONTACTS SCREEN ── */
    #contacts-screen { background: transparent; }
    .contacts-topbar {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(20px);
      border-bottom: 1.5px solid rgba(255,255,255,0.5);
      padding: 16px 20px;
      display: flex; align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .contacts-topbar h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 20px; font-weight: 700; color: var(--text-dark);
    }
    .user-badge {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: white; padding: 6px 14px;
      border-radius: 20px; font-size: 13px; font-weight: 700;
    }
    #contacts-list {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .contact-card {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 18px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: all 0.3s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .contact-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168,85,247,0.15); }
    .contact-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: white; flex-shrink: 0;
    }
    .contact-info { flex: 1; }
    .contact-name {
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 600; color: var(--text-dark);
    }
    .contact-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .chat-arrow { font-size: 20px; color: var(--purple); }
    .logout-btn {
      background: rgba(239,68,68,0.12); border: none;
      border-radius: 10px; padding: 8px 14px;
      color: #ef4444; font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }

    /* ── CHAT SCREEN ── */
    #chat-screen { background: transparent; }
    #top-bar {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(20px);
      border-bottom: 1.5px solid rgba(255,255,255,0.5);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .back-btn {
      background: rgba(168,85,247,0.12); border: none;
      border-radius: 10px; padding: 8px 12px;
      color: var(--purple); font-size: 18px; cursor: pointer;
    }
    .top-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: white;
    }
    .top-info { flex: 1; }
    .top-info h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 16px; font-weight: 600; color: var(--text-dark);
    }
    .online-dot {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--green); font-weight: 600;
    }
    .online-dot::before {
      content: ''; width: 7px; height: 7px;
      background: var(--green); border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.4); opacity: 0.7; }
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb {
      background: rgba(168,85,247,0.3); border-radius: 4px;
    }
    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
      animation: msgSlide 0.35s cubic-bezier(0.34,1.4,0.64,1);
    }
    @keyframes msgSlide {
      0% { opacity: 0; transform: translateY(16px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: white; flex-shrink: 0;
    }
    .msg-bubble {
      max-width: 72%; padding: 10px 14px; border-radius: 18px;
      font-size: 14.5px; line-height: 1.5; word-break: break-word;
    }
    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, #f857a6, #a855f7);
      color: white; border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(168,85,247,0.3);
    }
    .msg-row.other .msg-bubble {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8);
      border-bottom-left-radius: 4px;
      color: var(--text-dark);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .msg-time {
      font-size: 10px; margin-top: 4px;
      text-align: right; opacity: 0.65;
    }
    #bottom-bar {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(20px);
      border-top: 1.5px solid rgba(255,255,255,0.5);
      padding: 12px 16px; display: flex; gap: 10px; align-items: center;
    }
    #msg-input {
      flex: 1; background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 22px; padding: 12px 18px;
      font-family: 'Nunito', sans-serif; font-size: 15px;
      color: var(--text-dark); outline: none; transition: all 0.3s;
    }
    #msg-input:focus {
      border-color: var(--purple); background: rgba(255,255,255,0.75);
    }
    #msg-input::placeholder { color: var(--text-light); }
    #send-btn {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none; border-radius: 50%; color: white;
      font-size: 20px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(168,85,247,0.4);
      transition: all 0.3s; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    #send-btn:active { transform: scale(0.92); }
    #empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; gap: 10px; color: var(--text-light);
      font-size: 14px; text-align: center; padding: 40px;
    }
    #empty-state .emoji { font-size: 48px; }
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,27,75,0.85); color: white;
      padding: 10px 22px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transition: all 0.3s; z-index: 999;
      backdrop-filter: blur(10px); white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .empty-contacts {
      text-align: center; padding: 40px 20px;
      color: var(--text-light); font-size: 14px;
    }
    .empty-contacts .emoji { font-size: 48px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

<!-- Background bubbles -->
<div class="bg-bubble" style="width:120px;height:120px;background:#f857a6;left:10%;animation-duration:12s;"></div>
<div class="bg-bubble" style="width:80px;height:80px;background:#a855f7;left:70%;animation-duration:9s;animation-delay:2s;"></div>
<div class="bg-bubble" style="width:60px;height:60px;background:#3b82f6;left:40%;animation-duration:14s;animation-delay:4s;"></div>
<div class="bg-bubble" style="width:100px;height:100px;background:#06b6d4;left:85%;animation-duration:11s;animation-delay:1s;"></div>

<!-- ── AUTH SCREEN ── -->
<div id="auth-screen" class="screen active">
  <div class="name-card">
    <div class="app-logo">💬</div>
    <h1>ChatApp</h1>
    <p>Connect privately ✨</p>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    <div class="auth-form active" id="login-form">
      <div class="input-wrap">
        <span>👤</span>
        <input class="glass-input" id="login-username" type="text" placeholder="Username"/>
      </div>
      <div class="input-wrap">
        <span>🔒</span>
        <input class="glass-input" id="login-password" type="password" placeholder="Password"/>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="primary-btn" onclick="login()">Login →</button>
    </div>
    <div class="auth-form" id="register-form">
      <div class="input-wrap">
        <span>👤</span>
        <input class="glass-input" id="reg-username" type="text" placeholder="Choose username"/>
      </div>
      <div class="input-wrap">
        <span>🔒</span>
        <input class="glass-input" id="reg-password" type="password" placeholder="Create password"/>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <button class="primary-btn" onclick="register()">Create Account →</button>
    </div>
  </div>
</div>

<!-- ── CONTACTS SCREEN ── -->
<div id="contacts-screen" class="screen">
  <div class="contacts-topbar">
    <h2>💬 Chats</h2>
    <div style="display:flex;gap:8px;align-items:center;">
      <div class="user-badge" id="my-username-badge">Me</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div id="contacts-list"></div>
</div>

<!-- ── CHAT SCREEN ── -->
<div id="chat-screen" class="screen">
  <div id="top-bar">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="top-avatar" id="chat-avatar">?</div>
    <div class="top-info">
      <h3 id="chat-title">Chat</h3>
      <div class="online-dot">Online</div>
    </div>
  </div>
  <div id="messages">
    <div id="empty-state">
      <div class="emoji">👋</div>
      <strong>No messages yet!</strong>
      <span>Say hello!</span>
    </div>
  </div>
  <div id="bottom-bar">
    <input id="msg-input" type="text" placeholder="Type a message..."/>
    <button id="send-btn">➤</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const BACKEND = "https://chatapp-backend-8qb3.onrender.com";
  const socket = io(BACKEND);

  let username = "";
  let token = "";
  let currentRoom = "";
  let currentPartner = "";

  const avatarColors = ["#f857a6","#a855f7","#3b82f6","#06b6d4","#10b981","#f59e0b","#ef4444"];
  function getUserColor(name) {
    let hash = 0;
    for (let c of name) hash += c.charCodeAt(0);
    return avatarColors[hash % avatarColors.length];
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
    });
    document.getElementById('login-form').classList.toggle('active', tab==='login');
    document.getElementById('register-form').classList.toggle('active', tab==='register');
  }

  function getRoomId(a, b) {
    return [a, b].sort().join("_");
  }

  // ── REGISTER ──
  async function register() {
    const u = document.getElementById('reg-username').value.trim();
    const p = document.getElementById('reg-password').value.trim();
    if (!u || !p) return showError('reg-error', 'Fill all fields');
    try {
      const res = await fetch(BACKEND + '/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (!res.ok) return showError('reg-error', data.error);
      token = data.token;
      username = data.username;
      enterContacts();
    } catch { showError('reg-error', 'Connection error'); }
  }

  // ── LOGIN ──
  async function login() {
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value.trim();
    if (!u || !p) return showError('login-error', 'Fill all fields');
    try {
      const res = await fetch(BACKEND + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (!res.ok) return showError('login-error', data.error);
      token = data.token;
      username = data.username;
      enterContacts();
    } catch { showError('login-error', 'Connection error'); }
  }

  // ── CONTACTS ──
  async function enterContacts() {
    document.getElementById('my-username-badge').textContent = '👤 ' + username;
    showScreen('contacts-screen');
    showToast('Welcome, ' + username + '! 🎉');
    await loadContacts();
  }

  async function loadContacts() {
    const list = document.getElementById('contacts-list');
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#7c73b8;">Loading...</div>';
    try {
      const res = await fetch(BACKEND + '/users', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const users = await res.json();
      if (users.length === 0) {
        list.innerHTML = `<div class="empty-contacts"><span class="emoji">🙁</span>No other users yet.<br/>Ask a friend to register!</div>`;
        return;
      }
      list.innerHTML = '';
      users.forEach(u => {
        const color = getUserColor(u.username);
        const initial = u.username.charAt(0).toUpperCase();
        const card = document.createElement('div');
        card.className = 'contact-card';
        card.innerHTML = `
          <div class="contact-avatar" style="background:linear-gradient(135deg,${color},${color}99)">${initial}</div>
          <div class="contact-info">
            <div class="contact-name">${u.username}</div>
            <div class="contact-sub">Tap to chat privately</div>
          </div>
          <div class="chat-arrow">›</div>`;
        card.onclick = () => openChat(u.username);
        list.appendChild(card);
      });
    } catch {
      list.innerHTML = '<div style="text-align:center;padding:30px;color:#ef4444;">Failed to load users</div>';
    }
  }

  // ── OPEN CHAT ──
  async function openChat(partner) {
    currentPartner = partner;
    currentRoom = getRoomId(username, partner);
    const color = getUserColor(partner);
    const initial = partner.charAt(0).toUpperCase();

    document.getElementById('chat-title').textContent = partner;
    document.getElementById('chat-avatar').textContent = initial;
    document.getElementById('chat-avatar').style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
    document.getElementById('messages').innerHTML = `
      <div id="empty-state">
        <div class="emoji">👋</div>
        <strong>No messages yet!</strong>
        <span>Say hello to ${partner}!</span>
      </div>`;

    socket.emit('join_room', { userA: username, userB: partner });
    showScreen('chat-screen');
    await loadMessages();
  }

  async function loadMessages() {
    try {
      const res = await fetch(BACKEND + '/messages/' + currentRoom, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const msgs = await res.json();
      if (msgs.length > 0) {
        document.getElementById('empty-state')?.remove();
        msgs.forEach(m => addMessage(m.username, m.text, m.timestamp, false));
        scrollBottom();
      }
    } catch {}
  }

  // ── SEND ──
  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('msg-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
  });

  function sendMessage() {
    const text = document.getElementById('msg-input').value.trim();
    if (!text || !username || !currentRoom) return;
    socket.emit('send_message', { username, text, roomId: currentRoom });
    document.getElementById('msg-input').value = '';
  }

  // ── RECEIVE ──
  socket.on('receive_message', data => {
    document.getElementById('empty-state')?.remove();
    addMessage(data.username, data.text, data.timestamp, true);
    scrollBottom();
  });

  // ── ADD BUBBLE ──
  function addMessage(user, text, timestamp, animate) {
    const isMine = user === username;
    const color = getUserColor(user);
    const initial = user.charAt(0).toUpperCase();
    const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'other');
    if (!animate) row.style.animation = 'none';
    row.innerHTML = `
      <div class="msg-avatar" style="background:linear-gradient(135deg,${color},${color}99)">${initial}</div>
      <div class="msg-bubble">
        <div>${text}</div>
        <div class="msg-time">${time}</div>
      </div>`;
    document.getElementById('messages').appendChild(row);
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function goBack() {
    showScreen('contacts-screen');
    currentRoom = '';
    currentPartner = '';
  }

  function logout() {
    username = ''; token = ''; currentRoom = ''; currentPartner = '';
    showScreen('auth-screen');
  }

  // Enter key for auth
  document.getElementById('login-password').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
  });
  document.getElementById('reg-password').addEventListener('keypress', e => {
    if (e.key === 'Enter') register();
  });
</script>
</body>
</html>
