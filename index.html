<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #f857a6;
      --orange: #ff5858;
      --purple: #a855f7;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --green: #10b981;
      --glass: rgba(255,255,255,0.25);
      --glass-border: rgba(255,255,255,0.45);
      --glass-shadow: rgba(0,0,0,0.12);
      --text-dark: #1e1b4b;
      --text-mid: #4c4780;
      --text-light: #7c73b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 20%, #ffeaa7 40%, #dfe6e9 60%, #a29bfe 80%, #fd79a8 100%);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating bubbles background */
    .bg-bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.18;
      animation: floatBubble linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes floatBubble {
      0% { transform: translateY(110vh) scale(0.8); opacity: 0; }
      10% { opacity: 0.18; }
      90% { opacity: 0.18; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }

    /* ── NAME SCREEN ── */
    #name-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .name-card {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 32px;
      padding: 48px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(168,85,247,0.18), 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: cardPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes cardPop {
      0% { transform: scale(0.7) translateY(40px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .app-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 8px 24px rgba(168,85,247,0.35);
      animation: logoPulse 2.5s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(168,85,247,0.35); }
      50% { box-shadow: 0 8px 40px rgba(248,87,166,0.55); }
    }

    .name-card h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-dark);
      text-align: center;
    }

    .name-card p {
      font-size: 14px;
      color: var(--text-mid);
      text-align: center;
      margin-top: -10px;
    }

    .tab-row {
      display: flex;
      background: rgba(255,255,255,0.4);
      border-radius: 14px;
      padding: 4px;
      width: 100%;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      color: var(--text-mid);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: white;
      box-shadow: 0 4px 14px rgba(168,85,247,0.3);
    }

    .auth-form {
      display: none;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }
    .auth-form.active { display: flex; }

    .input-wrap {
      position: relative;
    }

    .input-wrap span {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
    }

    .glass-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      color: var(--text-dark);
      outline: none;
      transition: all 0.3s;
    }

    .glass-input:focus {
      border-color: var(--purple);
      background: rgba(255,255,255,0.7);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
    }

    .glass-input::placeholder { color: var(--text-light); }

    .primary-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none;
      border-radius: 14px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(168,85,247,0.35);
      transition: all 0.3s;
      letter-spacing: 0.3px;
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(168,85,247,0.45);
    }

    .primary-btn:active { transform: translateY(0); }

    .error-msg {
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      background: rgba(239,68,68,0.1);
      padding: 8px 14px;
      border-radius: 10px;
      display: none;
    }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      z-index: 50;
    }

    /* Top bar */
    #top-bar {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1.5px solid rgba(255,255,255,0.5);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .top-avatar {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .top-info { flex: 1; }

    .top-info h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .online-dot {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
    }

    .online-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }

    .logout-btn {
      background: rgba(239,68,68,0.12);
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      color: #ef4444;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.2); }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb {
      background: rgba(168,85,247,0.3);
      border-radius: 4px;
    }

    /* Date divider */
    .date-divider {
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 6px 0;
    }

    /* Message bubbles */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msgSlide 0.35s cubic-bezier(0.34,1.4,0.64,1);
    }

    @keyframes msgSlide {
      0% { opacity: 0; transform: translateY(16px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-row.mine { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      font-weight: 800;
      color: white;
    }

    .msg-bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.5;
      color: var(--text-dark);
      word-break: break-word;
    }

    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, #f857a6, #a855f7);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(168,85,247,0.3);
    }

    .msg-row.other .msg-bubble {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .msg-username {
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 3px;
      letter-spacing: 0.3px;
    }

    .msg-time {
      font-size: 10px;
      margin-top: 4px;
      text-align: right;
      opacity: 0.7;
    }

    /* Bottom bar */
    #bottom-bar {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1.5px solid rgba(255,255,255,0.5);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 22px;
      padding: 12px 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      color: var(--text-dark);
      outline: none;
      transition: all 0.3s;
    }

    #msg-input:focus {
      border-color: var(--purple);
      background: rgba(255,255,255,0.75);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.12);
    }

    #msg-input::placeholder { color: var(--text-light); }

    #send-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(168,85,247,0.4);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #send-btn:hover { transform: scale(1.1); }
    #send-btn:active { transform: scale(0.95); }

    /* Empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      color: var(--text-light);
      font-size: 14px;
      padding: 40px;
      text-align: center;
    }

    #empty-state .emoji { font-size: 48px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,27,75,0.85);
      color: white;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- Background bubbles -->
<div class="bg-bubble" style="width:120px;height:120px;background:#f857a6;left:10%;animation-duration:12s;animation-delay:0s;"></div>
<div class="bg-bubble" style="width:80px;height:80px;background:#a855f7;left:70%;animation-duration:9s;animation-delay:2s;"></div>
<div class="bg-bubble" style="width:60px;height:60px;background:#3b82f6;left:40%;animation-duration:14s;animation-delay:4s;"></div>
<div class="bg-bubble" style="width:100px;height:100px;background:#06b6d4;left:85%;animation-duration:11s;animation-delay:1s;"></div>
<div class="bg-bubble" style="width:70px;height:70px;background:#f59e0b;left:25%;animation-duration:13s;animation-delay:3s;"></div>

<!-- ── NAME / AUTH SCREEN ── -->
<div id="name-screen">
  <div class="name-card">
    <div class="app-logo">💬</div>
    <h1>ChatApp</h1>
    <p>Connect and chat instantly ✨</p>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div class="auth-form active" id="login-form">
      <div class="input-wrap">
        <span>👤</span>
        <input class="glass-input" id="login-username" type="text" placeholder="Username"/>
      </div>
      <div class="input-wrap">
        <span>🔒</span>
        <input class="glass-input" id="login-password" type="password" placeholder="Password"/>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="primary-btn" onclick="login()">Login →</button>
    </div>

    <!-- Register Form -->
    <div class="auth-form" id="register-form">
      <div class="input-wrap">
        <span>👤</span>
        <input class="glass-input" id="reg-username" type="text" placeholder="Choose a username"/>
      </div>
      <div class="input-wrap">
        <span>🔒</span>
        <input class="glass-input" id="reg-password" type="password" placeholder="Create a password"/>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <button class="primary-btn" onclick="register()">Create Account →</button>
    </div>
  </div>
</div>

<!-- ── CHAT SCREEN ── -->
<div id="chat-screen">
  <div id="top-bar">
    <div class="top-avatar">💬</div>
    <div class="top-info">
      <h3>ChatApp</h3>
      <div class="online-dot">Online</div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="emoji">👋</div>
      <strong>No messages yet!</strong>
      <span>Be the first to say hello</span>
    </div>
  </div>

  <div id="bottom-bar">
    <input id="msg-input" type="text" placeholder="Type a message..."/>
    <button id="send-btn">➤</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const BACKEND = "https://chatapp-backend-8qb3.onrender.com";
  const socket = io(BACKEND);

  let username = "";
  let token = "";

  // Avatar colors per user
  const avatarColors = ["#f857a6","#a855f7","#3b82f6","#06b6d4","#10b981","#f59e0b","#ef4444","#8b5cf6"];
  const userColorMap = {};
  function getUserColor(name) {
    if (!userColorMap[name]) {
      const idx = Object.keys(userColorMap).length % avatarColors.length;
      userColorMap[name] = avatarColors[idx];
    }
    return userColorMap[name];
  }

  // Tab switch
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
    });
    document.getElementById('login-form').classList.toggle('active', tab==='login');
    document.getElementById('register-form').classList.toggle('active', tab==='register');
  }

  // Show error
  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Register
  async function register() {
    const u = document.getElementById('reg-username').value.trim();
    const p = document.getElementById('reg-password').value.trim();
    if (!u || !p) return showError('reg-error', 'Please fill all fields');
    if (p.length < 4) return showError('reg-error', 'Password too short (min 4 chars)');
    try {
      const res = await fetch(BACKEND + '/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (!res.ok) return showError('reg-error', data.error || 'Error');
      token = data.token;
      username = data.username;
      enterChat();
    } catch {
      showError('reg-error', 'Connection error');
    }
  }

  // Login
  async function login() {
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value.trim();
    if (!u || !p) return showError('login-error', 'Please fill all fields');
    try {
      const res = await fetch(BACKEND + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (!res.ok) return showError('login-error', data.error || 'Error');
      token = data.token;
      username = data.username;
      enterChat();
    } catch {
      showError('login-error', 'Connection error');
    }
  }

  // Enter chat
  async function enterChat() {
    document.getElementById('name-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    showToast('Welcome, ' + username + '! 🎉');
    await loadOldMessages();
  }

  // Logout
  function logout() {
    username = '';
    token = '';
    document.getElementById('messages').innerHTML = `
      <div id="empty-state">
        <div class="emoji">👋</div>
        <strong>No messages yet!</strong>
        <span>Be the first to say hello</span>
      </div>`;
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('name-screen').style.display = 'flex';
  }

  // Load old messages
  async function loadOldMessages() {
    try {
      const res = await fetch(BACKEND + '/messages');
      const msgs = await res.json();
      if (msgs.length > 0) {
        document.getElementById('empty-state')?.remove();
        msgs.forEach(m => addMessage(m.username, m.text, m.timestamp, false));
        scrollBottom();
      }
    } catch {}
  }

  // Send message
  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('msg-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
  });

  function sendMessage() {
    const text = document.getElementById('msg-input').value.trim();
    if (!text || !username) return;
    socket.emit('send_message', { username, text });
    document.getElementById('msg-input').value = '';
  }

  // Receive message
  socket.on('receive_message', data => {
    document.getElementById('empty-state')?.remove();
    addMessage(data.username, data.text, data.timestamp, true);
    scrollBottom();
  });

  // Add bubble
  function addMessage(user, text, timestamp, animate) {
    const isMine = user === username;
    const color = getUserColor(user);
    const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const initial = user.charAt(0).toUpperCase();

    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'other');
    if (!animate) row.style.animation = 'none';

    row.innerHTML = `
      <div class="msg-avatar" style="background: linear-gradient(135deg, ${color}, ${color}99)">${initial}</div>
      <div class="msg-bubble">
        ${!isMine ? `<div class="msg-username" style="color:${color}">${user}</div>` : ''}
        <div>${escapeHtml(text)}</div>
        <div class="msg-time">${time}</div>
      </div>`;

    document.getElementById('messages').appendChild(row);
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  // Enter key for auth
  document.getElementById('login-password').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
  });
  document.getElementById('reg-password').addEventListener('keypress', e => {
    if (e.key === 'Enter') register();
  });
</script>
</body>
</html>
