<!-- ── AUTH SCREEN ── -->

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const BACKEND = "https://chatapp-backend-8qb3.onrender.com";
const socket = io(BACKEND);

let username = "";
let token = "";
let currentRoom = "";
let currentPartner = "";
let myPrivateKey = null;
let myPublicKey = null;
let partnerPublicKey = null;

const avatarColors = ["#f857a6","#a855f7","#3b82f6","#06b6d4","#10b981","#f59e0b","#ef4444"];
function getUserColor(name) {
  let hash = 0;
  for (let c of name) hash += c.charCodeAt(0);
  return avatarColors[hash % avatarColors.length];
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
  });
  document.getElementById('login-form').classList.toggle('active', tab==='login');
  document.getElementById('register-form').classList.toggle('active', tab==='register');
}

function getRoomId(a, b) { return [a, b].sort().join("_"); }

// ── CRYPTO HELPERS ──

// Derive a 32-byte key from password using SHA-256
async function deriveKeyFromPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return new Uint8Array(hashBuffer);
}

// Encrypt private key using password
async function encryptPrivateKey(privateKey, password) {
  const keyBytes = await deriveKeyFromPassword(password);
  const nonce = nacl.randomBytes(nacl.secretbox.nonceLength);
  const encrypted = nacl.secretbox(privateKey, nonce, keyBytes);
  return {
    encrypted: naclUtil.encodeBase64(encrypted),
    nonce: naclUtil.encodeBase64(nonce)
  };
}

// Decrypt private key using password
async function decryptPrivateKey(encryptedData, password) {
  const keyBytes = await deriveKeyFromPassword(password);
  const encrypted = naclUtil.decodeBase64(encryptedData.encrypted);
  const nonce = naclUtil.decodeBase64(encryptedData.nonce);
  const decrypted = nacl.secretbox.open(encrypted, nonce, keyBytes);
  return decrypted;
}

// Encrypt message with receiver's public key
function encryptMessage(text, receiverPublicKey, senderPrivateKey) {
  const nonce = nacl.randomBytes(nacl.box.nonceLength);
  const msgUint8 = naclUtil.decodeUTF8(text);
  const receiverPubKey = naclUtil.decodeBase64(receiverPublicKey);
  const encrypted = nacl.box(msgUint8, nonce, receiverPubKey, senderPrivateKey);
  return JSON.stringify({
    encrypted: naclUtil.encodeBase64(encrypted),
    nonce: naclUtil.encodeBase64(nonce)
  });
}

// Decrypt message with your private key
function decryptMessage(encryptedText, senderPublicKey, receiverPrivateKey) {
  try {
    const { encrypted, nonce } = JSON.parse(encryptedText);
    const senderPubKey = naclUtil.decodeBase64(senderPublicKey);
    const decrypted = nacl.box.open(
      naclUtil.decodeBase64(encrypted),
      naclUtil.decodeBase64(nonce),
      senderPubKey,
      receiverPrivateKey
    );
    if (!decrypted) return "🔒 Encrypted message";
    return naclUtil.encodeUTF8(decrypted);
  } catch {
    return "🔒 Encrypted message";
  }
}

// ── REGISTER ──
async function register() {
  const u = document.getElementById('reg-username').value.trim();
  const p = document.getElementById('reg-password').value.trim();
  if (!u || !p) return showError('reg-error', 'Fill all fields');
  if (p.length < 4) return showError('reg-error', 'Password min 4 characters');

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = 'Generating keys...';

  try {
    // Generate key pair
    const keyPair = nacl.box.keyPair();
    const publicKeyB64 = naclUtil.encodeBase64(keyPair.publicKey);

    // Encrypt private key with password
    const encryptedPrivateKey = await encryptPrivateKey(keyPair.secretKey, p);

    const res = await fetch(BACKEND + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: u,
        password: p,
        publicKey: publicKeyB64,
        encryptedPrivateKey: JSON.stringify(encryptedPrivateKey)
      })
    });
    const data = await res.json();
    if (!res.ok) {
      showError('reg-error', data.error);
      btn.disabled = false;
      btn.textContent = 'Create Account →';
      return;
    }

    token = data.token;
    username = data.username;
    myPrivateKey = keyPair.secretKey;
    myPublicKey = keyPair.publicKey;

    enterContacts();
  } catch(err) {
    showError('reg-error', err.message || 'Connection error');
    btn.disabled = false;
    btn.textContent = 'Create Account →';
  }
}

// ── LOGIN ──
async function login() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value.trim();
  if (!u || !p) return showError('login-error', 'Fill all fields');

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Decrypting keys...';

  try {
    const res = await fetch(BACKEND + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (!res.ok) {
      showError('login-error', data.error);
      btn.disabled = false;
      btn.textContent = 'Login →';
      return;
    }

    // Decrypt private key using password
    const encryptedPrivateKey = JSON.parse(data.encryptedPrivateKey);
    const privateKey = await decryptPrivateKey(encryptedPrivateKey, p);

    if (!privateKey) {
      showError('login-error', 'Failed to decrypt keys. Wrong password?');
      btn.disabled = false;
      btn.textContent = 'Login →';
      return;
    }

    token = data.token;
    username = data.username;
    myPrivateKey = privateKey;
    myPublicKey = naclUtil.decodeBase64(data.publicKey);

    enterContacts();
  } catch {
    showError('login-error', 'Connection error');
    btn.disabled = false;
    btn.textContent = 'Login →';
  }
}

// ── CONTACTS ──
async function enterContacts() {
  document.getElementById('my-username-badge').textContent = '👤 ' + username;
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Login →';
  showScreen('contacts-screen');
  showToast('Welcome, ' + username + '! 🔐');
  await loadContacts();
}

async function loadContacts() {
  const list = document.getElementById('contacts-list');
  list.innerHTML = '<div style="text-align:center;padding:30px;color:#7c73b8;">Loading...</div>';
  try {
    const res = await fetch(BACKEND + '/users', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const users = await res.json();
    if (users.length === 0) {
      list.innerHTML = `<div class="empty-contacts"><span class="emoji">🙁</span>No other users yet.<br/>Ask a friend to register!</div>`;
      return;
    }
    list.innerHTML = '';
    users.forEach(u => {
      const color = getUserColor(u.username);
      const initial = u.username.charAt(0).toUpperCase();
      const card = document.createElement('div');
      card.className = 'contact-card';
      card.innerHTML = `
        <div class="contact-avatar" style="background:linear-gradient(135deg,${color},${color}99)">${initial}</div>
        <div class="contact-info">
          <div class="contact-name">${u.username}</div>
          <div class="contact-sub">🔐 End-to-end encrypted</div>
        </div>
        <div class="chat-arrow">›</div>`;
      card.onclick = () => openChat(u.username, u.publicKey);
      list.appendChild(card);
    });
  } catch {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#ef4444;">Failed to load</div>';
  }
}

// ── OPEN CHAT ──
async function openChat(partner, partnerPubKeyB64) {
  currentPartner = partner;
  currentRoom = getRoomId(username, partner);
  partnerPublicKey = partnerPubKeyB64;

  const color = getUserColor(partner);
  document.getElementById('chat-title').textContent = partner;
  document.getElementById('chat-avatar').textContent = partner.charAt(0).toUpperCase();
  document.getElementById('chat-avatar').style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
  document.getElementById('messages').innerHTML = `
    <div id="empty-state">
      <div class="emoji">👋</div>
      <strong>No messages yet!</strong>
      <span>Say hello to ${partner}!</span>
    </div>`;

  socket.emit('join_room', { userA: username, userB: partner });
  showScreen('chat-screen');
  await loadMessages();
}

// ── LOAD MESSAGES ──
async function loadMessages() {
  try {
    const res = await fetch(BACKEND + '/messages/' + currentRoom, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const msgs = await res.json();
    if (msgs.length > 0) {
      document.getElementById('empty-state')?.remove();
      for (const m of msgs) {
        const isMine = m.username === username;
        let text = m.text;
        try {
          const senderPubKey = isMine
            ? naclUtil.encodeBase64(myPublicKey)
            : partnerPublicKey;
          text = decryptMessage(m.text, senderPubKey, myPrivateKey);
        } catch {}
        addMessage(m.username, text, m.timestamp, false);
      }
      scrollBottom();
    }
  } catch {}
}

// ── SEND MESSAGE ──
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});

function sendMessage() {
  const text = document.getElementById('msg-input').value.trim();
  if (!text || !username || !currentRoom || !partnerPublicKey || !myPrivateKey) return;

  // Encrypt for receiver
  const encryptedForReceiver = encryptMessage(text, partnerPublicKey, myPrivateKey);

  socket.emit('send_message', {
    username,
    text: encryptedForReceiver,
    roomId: currentRoom
  });

  document.getElementById('msg-input').value = '';

  // Show own message immediately (decrypted)
  document.getElementById('empty-state')?.remove();
  addMessage(username, text, new Date(), true);
  scrollBottom();
}

// ── RECEIVE MESSAGE ──
socket.on('receive_message', data => {
  if (data.username === username) return; // already shown above
  document.getElementById('empty-state')?.remove();
  let text = data.text;
  try {
    text = decryptMessage(data.text, partnerPublicKey, myPrivateKey);
  } catch {}
  addMessage(data.username, text, data.timestamp, true);
  scrollBottom();
});

// ── ADD BUBBLE ──
function addMessage(user, text, timestamp, animate) {
  const isMine = user === username;
  const color = getUserColor(user);
  const initial = user.charAt(0).toUpperCase();
  const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'other');
  if (!animate) row.style.animation = 'none';
  row.innerHTML = `
    <div class="msg-avatar" style="background:linear-gradient(135deg,${color},${color}99)">${initial}</div>
    <div class="msg-bubble">
      <div>${text}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  document.getElementById('messages').appendChild(row);
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function goBack() {
  showScreen('contacts-screen');
  currentRoom = '';
  currentPartner = '';
  partnerPublicKey = null;
}

function logout() {
  username = ''; token = ''; currentRoom = '';
  currentPartner = ''; myPrivateKey = null;
  myPublicKey = null; partnerPublicKey = null;
  showScreen('auth-screen');
}

document.getElementById('login-password').addEventListener('keypress', e => {
  if (e.key === 'Enter') login();
});
document.getElementById('reg-password').addEventListener('keypress', e => {
  if (e.key === 'Enter') register();
});
</script>
